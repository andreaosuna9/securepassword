<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Felicidades</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ECFDF5, #F8FAFC, #EEF2FF);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #0F172A;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            max-width: 720px;
            width: 100%;
            padding: 45px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
            border: 1px solid #E2E8F0;
        }

        .icono {
            width: 76px;
            height: 76px;
            background: #DCFCE7;
            color: #16A34A;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 38px;
            font-weight: 700;
        }

        h1 {
            color: #16A34A;
            font-size: 42px;
            margin-bottom: 22px;
        }

        img {
            width: 100%;
            max-width: 390px;
            height: auto;
        }

        p {
            color: #64748B;
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            background: linear-gradient(135deg, #2563EB, #4F46E5);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 14px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.32);
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>

</head>

<body>

    <div class="card">


        <h1>¡Felicidades!</h1>

        <img src="{{ url_for('static', filename='felicidades.jpg') }}" alt="felicidades">

        <p>
            Tu contraseña cumple con todos los requisitos de seguridad.
            Has creado una contraseña fuerte siguiendo buenas prácticas
            para proteger mejor tu información.
        </p>

        <a href="/">
            Volver
        </a>

    </div>

</body>

</html>
