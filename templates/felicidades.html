<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Felicidades</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #F8FAFC;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .card {
            background: white;
            max-width: 700px;
            width: 100%;

            padding: 40px;

            border-radius: 24px;

            text-align: center;

            box-shadow: 0 15px 35px rgba(0, 0, 0, .08);
        }

        h1 {
            color: #000000;
            font-size: 42px;
            margin-bottom: 25px;
        }

        img {
            width: 100%;
            max-width: 400px;
            height: auto;

            border-radius: 16px;

            margin-bottom: 25px;
        }

        p {
            color: #64748B;

            font-size: 17px;

            line-height: 1.7;

            margin-bottom: 30px;
        }

        a {
            display: inline-block;

            background: #2563EB;

            color: white;

            text-decoration: none;

            padding: 14px 28px;

            border-radius: 12px;

            font-weight: 600;

            transition: .3s;
        }

        a:hover {
            transform: translateY(-2px);
        }
    </style>

</head>

<body>
