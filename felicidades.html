<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Felicidades</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', 'Product Sans', 'Poppins', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 35%),
                radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.12), transparent 35%),
                #F8FAFC;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #0F172A;
        }

       .card {
    background: rgba(255, 255, 255, 0.98);
    max-width: 720px;
    width: 100%;
    padding: 46px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    border: 1px solid #E2E8F0;

    display: flex;
    flex-direction: column;
    align-items: center;
}

        .icono {
            width: 76px;
            height: 76px;
            background: #DCFCE7;
            color: #15803D;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 38px;
            font-weight: 700;
            border: 1px solid #BBF7D0;
        }

        .badge {
            display: inline-block;
            background: #ECFDF5;
            color: #15803D;
            padding: 7px 15px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            border: 1px solid #BBF7D0;
        }

        h1 {
            color: #0F172A;
            font-size: 42px;
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: -0.8px;
        }

        .subtitulo {
            color: #15803D;
            font-weight: 600;
            margin-bottom: 24px;
        }

        img {
    width: 100%;
    max-width: 390px;
    height: auto;
    border-radius: 18px;
    margin-bottom: 26px;
    display: block;
}

        p {
            color: #64748B;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 32px;
        }

     a {
    display: inline-block;
    background: linear-gradient(135deg, #1D4ED8, #4338CA);
    color: white;
    text-decoration: none;
    padding: 14px 30px;
    border-radius: 10px;
    font-family: 'Google Sans', 'Product Sans', 'Poppins', sans-serif;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.24);
}

a:hover {
    box-shadow: 0 15px 30px rgba(37, 99, 235, 0.30);
        transform: translateY(-2px);

}

        @media (max-width: 600px) {
            .card {
                padding: 30px;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 15px;
            }

            .icono {
                width: 66px;
                height: 66px;
                font-size: 32px;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <span class="badge">
            Contraseña segura
        </span>

        <h1>¡Felicidades!</h1>

        <p class="subtitulo">
            Tu contraseña cumple con todos los requisitos.
        </p>

        <img src="{{ url_for('static', filename='felicidades.jpg') }}" alt="felicidades">


        <a href="/">
            Volver
        </a>

    </div>

</body>

</html>
